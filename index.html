<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>دبي ماركت</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 pb-32">

    <header class="bg-blue-700 text-white p-6 text-center shadow-lg">
        <h1 class="text-2xl font-bold">🛒 دبي ماركت</h1>
    </header>

    <div class="p-4">
        <input type="text" id="search" oninput="render()" placeholder="🔍 ابحث عن منتج..." class="w-full p-3 rounded-xl border mb-4">
        <div id="grid" class="grid grid-cols-1 gap-4"></div>
    </div>

    <div class="fixed bottom-0 w-full bg-white p-4 border-t shadow-2xl">
        <div id="cartSummary" class="text-sm mb-2 max-h-32 overflow-y-auto border-b pb-2"></div>
        <input type="text" id="cName" placeholder="👤 اسمك" class="w-full p-2 mb-1 border rounded text-sm">
        <input type="text" id="cAddr" placeholder="📍 عنوانك" class="w-full p-2 mb-2 border rounded text-sm">
        <button onclick="sendOrder()" class="w-full bg-green-600 text-white py-3 rounded-lg font-bold">🚀 إرسال الطلب عبر واتساب</button>
    </div>

    <script>
        const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTtNzL5RpYNOFwQsy63YyqYLK4ExXEKO8nfmfKlLdRMoIFy1sPIZT8dPFcKkQK6f2P9jYPuFDQOxW3C/pub?gid=0&single=true&output=csv';
        let products = [], cart = {};

        async function init() {
            try {
                const res = await fetch(CSV_URL + "&t=" + Date.now());
                const data = await res.text();
                // ترتيب الأعمدة: [0]=الاسم، [1]=غير مستخدم، [2]=القسم، [3]=السعر، [4]=الصورة
                products = data.split('\n').slice(1).map(row => {
                    const cols = row.split(',');
                    return { name: cols[0], price: cols[3] || 0, cat: cols[2], img: cols[4] || '' };
                }).filter(p => p.name);
                
                // إضافة منتجات تجريبية لو الشيت فارغ
                if(products.length === 0) {
                    products = [
                        {name: 'سنيكرز', price: 150, cat: 'حلويات', img: ''},
                        {name: 'حليب 1 لتر', price: 400, cat: 'ألبان', img: ''},
                        {name: 'كولا 7 اب', price: 250, cat: 'مشروبات', img: ''}
                    ];
                }
                render();
            } catch (e) { alert("خطأ في تحميل البيانات"); }
        }

        function render() {
            const search = document.getElementById('search').value.toLowerCase();
            const list = products.filter(p => p.name.toLowerCase().includes(search));
            document.getElementById('grid').innerHTML = list.map(p => `
                <div class="bg-white p-3 rounded-xl shadow flex items-center gap-3">
                    <img src="${p.img}" onerror="this.src='https://via.placeholder.com/150'" class="w-16 h-16 rounded-lg object-cover">
                    <div class="flex-grow">
                        <h3 class="font-bold text-sm">${p.name}</h3>
                        <p class="text-blue-600 font-bold text-xs">${p.price} ل.س</p>
                        <input type="text" id="note-${p.name}" placeholder="ملاحظة..." class="text-[10px] w-full border rounded p-1 mt-1">
                    </div>
                    <div class="flex items-center gap-2">
                        <button onclick="update('${p.name}', -1)" class="w-8 h-8 bg-gray-200 rounded-full">-</button>
                        <span id="qty-${p.name}" class="font-bold w-6 text-center">0</span>
                        <button onclick="update('${p.name}', 1)" class="w-8 h-8 bg-blue-500 text-white rounded-full">+</button>
                    </div>
                </div>
            `).join('');
        }

        function update(name, change) {
            if(!cart[name]) cart[name] = {qty: 0, note: ''};
            cart[name].qty = Math.max(0, cart[name].qty + change);
            cart[name].note = document.getElementById('note-'+name).value;
            document.getElementById(`qty-${name}`).innerText = cart[name].qty;
            showCart();
        }

        function showCart() {
            let html = '<p class="font-bold mb-1">طلباتك:</p>';
            let total = 0;
            products.forEach(p => {
                if(cart[p.name]?.qty > 0) {
                    html += `<div class="text-[12px] flex justify-between"><span>${p.name} (x${cart[p.name].qty})</span><span>${cart[p.name].note}</span></div>`;
                }
            });
            document.getElementById('cartSummary').innerHTML = html;
        }

        function sendOrder() {
            const name = document.getElementById('cName').value;
            const addr = document.getElementById('cAddr').value;
            if(!name || !addr) return alert("اكتب الاسم والعنوان!");
            let msg = `*طلب جديد - دبي ماركت*\n👤 ${name}\n📍 ${addr}\n\n`;
            products.forEach(p => { if(cart[p.name]?.qty > 0) msg += `• ${p.name} (x${cart[p.name].qty}) - ملاحظة: ${document.getElementById('note-'+p.name).value}\n`; });
            window.open(`https://wa.me/963965436980?text=${encodeURIComponent(msg)}`);
        }
        init();
    </script>
</body>
</html>
