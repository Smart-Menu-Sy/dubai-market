<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>دبي ماركت</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 pb-48">

    <header class="bg-blue-600 text-white p-6 text-center shadow-lg">
        <h1 class="text-2xl font-bold">🛒 دبي ماركت</h1>
    </header>

    <div class="p-4">
        <input type="text" id="search" oninput="render()" placeholder="🔍 ابحث عن منتج..." class="w-full p-3 rounded-xl border mb-4">
        <div id="grid" class="grid grid-cols-1 gap-4"></div>
    </div>

    <div class="fixed bottom-0 w-full bg-white p-4 border-t shadow-2xl rounded-t-2xl">
        <div class="mb-3 p-2 bg-gray-100 rounded-lg max-h-24 overflow-y-auto" id="cartSummary">
            <p class="text-xs text-gray-500">السلة فارغة...</p>
        </div>
        <input type="text" id="cNote" placeholder="📝 ملاحظات الطلب (اختياري)..." class="w-full p-2 mb-1 border rounded text-sm">
        <div class="grid grid-cols-2 gap-2 mb-2">
            <input type="text" id="cName" placeholder="👤 اسمك" class="p-2 border rounded text-sm">
            <input type="text" id="cAddr" placeholder="📍 عنوانك" class="p-2 border rounded text-sm">
        </div>
        <button id="sendBtn" onclick="sendOrder()" class="w-full bg-green-600 text-white py-3 rounded-lg font-bold">🚀 إرسال الطلب (0 ل.س)</button>
    </div>

    <script>
        const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTtNzL5RpYNOFwQsy63YyqYLK4ExXEKO8nfmfKlLdRMoIFy1sPIZT8dPFcKkQK6f2P9jYPuFDQOxW3C/pub?gid=0&single=true&output=csv';
        let products = [], cart = {};

        async function init() {
            const res = await fetch(CSV_URL + "&t=" + Date.now());
            const data = await res.text();
            products = data.split('\n').slice(1).map(row => {
                const cols = row.split(',');
                return { name: cols[0], cat: cols[2], price: parseFloat(cols[3]) || 0, img: cols[4] || '' };
            }).filter(p => p.name);
            render();
        }

        function render() {
            const search = document.getElementById('search').value.toLowerCase();
            const list = products.filter(p => p.name.toLowerCase().includes(search));
            document.getElementById('grid').innerHTML = list.map(p => `
                <div class="bg-white p-3 rounded-xl shadow flex items-center gap-3 border">
                    <img src="${p.img}" onerror="this.src='https://via.placeholder.com/150'" class="w-16 h-16 rounded-lg object-cover bg-gray-100">
                    <div class="flex-grow">
                        <h3 class="font-bold text-sm">${p.name}</h3>
                        <p class="text-blue-600 font-bold text-xs">${p.price} ل.س</p>
                    </div>
                    <div class="flex items-center gap-2">
                        <button onclick="update('${p.name}', -1)" class="w-8 h-8 bg-gray-200 rounded-full">-</button>
                        <span id="qty-${p.name}" class="font-bold w-6 text-center">0</span>
                        <button onclick="update('${p.name}', 1)" class="w-8 h-8 bg-blue-500 text-white rounded-full">+</button>
                    </div>
                </div>
            `).join('');
        }

        function update(name, change) {
            if(!cart[name]) cart[name] = 0;
            cart[name] = Math.max(0, cart[name] + change);
            document.getElementById(`qty-${name}`).innerText = cart[name];
            updateCart();
        }

        function updateCart() {
            let html = '', total = 0;
            products.forEach(p => {
                if(cart[p.name] > 0) {
                    html += `<div class="text-xs flex justify-between"><span>${p.name} x${cart[p.name]}</span><span>${cart[p.name] * p.price} ل.س</span></div>`;
                    total += (cart[p.name] * p.price);
                }
            });
            document.getElementById('cartSummary').innerHTML = html || '<p class="text-xs text-gray-500">السلة فارغة...</p>';
            document.getElementById('sendBtn').innerText = `🚀 إرسال الطلب (${total} ل.س)`;
        }

        function sendOrder() {
            const name = document.getElementById('cName').value;
            const addr = document.getElementById('cAddr').value;
            const note = document.getElementById('cNote').value;
            if(!name || !addr) return alert("يرجى كتابة الاسم والعنوان!");
            let msg = `*طلب جديد - دبي ماركت*\n👤 ${name}\n📍 ${addr}\n📝 ${note}\n\n`;
            products.forEach(p => { if(cart[p.name] > 0) msg += `• ${p.name} (x${cart[p.name]})\n`; });
            window.open(`https://wa.me/963965436980?text=${encodeURIComponent(msg)}`);
        }
        init();
    </script>
</body>
</html>
