<script>
const WA='963965436980',SU='https://docs.google.com/spreadsheets/d/e/2PACX-1vTtNzL5RpYNOFwQsy63YyqYLK4ExXEKO8nfmfKlLdRMoIFy1sPIZT8dPFcKkQK6f2P9jYPuFDQOxW3C/pub?gid=0&single=true&output=csv',MX=40,MXF=150;
// ============================
// CONFIG
// ============================
const WA='963965436980';
const SU='https://docs.google.com/spreadsheets/d/e/2PACX-1vTtNzL5RpYNOFwQsy63YyqYLK4ExXEKO8nfmfKlLdRMoIFy1sPIZT8dPFcKkQK6f2P9jYPuFDQOxW3C/pub?gid=0&single=true&output=csv';
const MX=40,MXF=150;
// ============================
// STATE
// ============================
let P=[],cart={},aCat='all',sQ='',cExp=false,sT=null;
const CACHE_KEY='dm_products_v1',CACHE_TIME=10*60*1000; // 10 min cache
// SVG placeholder
const PH=`<div class="ph"><svg viewBox="0 0 64 64" fill="none"><circle cx="32" cy="32" r="32" fill="rgba(59,130,246,.1)"/><path d="M16 20h4l4 16h16l4-12H24" stroke="rgba(59,130,246,.4)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/><circle cx="28" cy="42" r="2" fill="rgba(59,130,246,.4)"/><circle cx="40" cy="42" r="2" fill="rgba(59,130,246,.4)"/></svg></div>`;
// ============================
// PLACEHOLDER
// ============================
const PH=`<div class="ph"><svg viewBox="0 0 64 64" fill="none"><circle cx="32" cy="32" r="32" fill="rgba(220,38,38,.08)"/><path d="M16 20h4l4 16h16l4-12H24" stroke="rgba(220,38,38,.35)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/><circle cx="28" cy="42" r="2" fill="rgba(220,38,38,.35)"/><circle cx="40" cy="42" r="2" fill="rgba(220,38,38,.35)"/></svg></div>`;
// === TOAST ===
// ============================
// TOAST
// ============================
function toast(m){const t=document.getElementById('tst');t.textContent=m;t.classList.add('on');setTimeout(()=>t.classList.remove('on'),1800)}
// === SCROLL ===
window.addEventListener('scroll',()=>{document.getElementById('btt').classList.toggle('on',scrollY>350)},{passive:true});
// ============================
// SCROLL
// ============================
window.addEventListener('scroll',()=>document.getElementById('btt').classList.toggle('on',scrollY>350),{passive:true});
// === LOAD DATA ===
// ============================
// DATA LOAD — with localStorage cache + timeout + retry
// ============================
async function fetchWithTimeout(url,ms=8000){
  const ctrl=new AbortController();
  const id=setTimeout(()=>ctrl.abort(),ms);
  try{const r=await fetch(url,{signal:ctrl.signal});clearTimeout(id);return r}
  catch(e){clearTimeout(id);throw e}
}
async function load(){
  // 1. Try localStorage cache first (instant display)
  try{
    const r=await fetch(SU+'&t='+Date.now());
    const cached=localStorage.getItem(CACHE_KEY);
    if(cached){
      const {data,ts}=JSON.parse(cached);
      if(Date.now()-ts<CACHE_TIME&&data.length>0){
        P=data;buildCats();render();
        // Refresh in background silently
        refreshInBackground();
        return;
      }
    }
  }catch(e){}
  // 2. Fetch fresh data
  await fetchFresh();
}
async function fetchFresh(){
  try{
    const r=await fetchWithTimeout(SU+'&t='+Date.now(),10000);
    if(!r.ok)throw new Error('HTTP '+r.status);
    const t=await r.text();
    P=parseCSV(t);buildCats();render();
    P=parseCSV(t);
    // Save to cache
    try{localStorage.setItem(CACHE_KEY,JSON.stringify({data:P,ts:Date.now()}))}catch(e){}
    buildCats();render();
  }catch(e){
    document.getElementById('ld').innerHTML=`<div style="font-size:48px">⚠️</div><div style="color:var(--red);font-size:16px;font-weight:800">فشل تحميل البيانات</div><div style="color:var(--t4);font-size:12px;text-align:center">تأكد من اتصال الإنترنت<br><small>${e.message}</small></div><button onclick="location.reload()" style="margin-top:14px;background:var(--accent);color:#fff;border:none;border-radius:12px;padding:10px 24px;font-family:var(--font);font-size:14px;font-weight:800;cursor:pointer">إعادة المحاولة</button>`;
    // Show retry UI
    document.getElementById('gd').innerHTML=`
      <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 20px;gap:16px;text-align:center">
        <div style="font-size:48px">⚠️</div>
        <div style="color:#ef4444;font-size:16px;font-weight:800">فشل تحميل البيانات</div>
        <div style="color:var(--t4);font-size:13px;line-height:1.6">تأكد من اتصال الإنترنت<br><small style="opacity:.6">${e.message||''}</small></div>
        <button onclick="retryLoad()" style="margin-top:8px;background:linear-gradient(135deg,var(--red),var(--red3));color:#fff;border:none;border-radius:12px;padding:11px 28px;font-family:var(--font);font-size:14px;font-weight:800;cursor:pointer;box-shadow:0 4px 14px rgba(220,38,38,.3)">إعادة المحاولة</button>
      </div>`;
    document.getElementById('emp').style.display='none';
  }
}
async function refreshInBackground(){
  try{
    const r=await fetchWithTimeout(SU+'&t='+Date.now(),12000);
    if(!r.ok)return;
    const t=await r.text();
    const fresh=parseCSV(t);
    if(fresh.length>0){
      P=fresh;
      try{localStorage.setItem(CACHE_KEY,JSON.stringify({data:P,ts:Date.now()}))}catch(e){}
    }
  }catch(e){}
}
function retryLoad(){
  document.getElementById('gd').innerHTML='<div style="display:flex;align-items:center;justify-content:center;padding:60px;flex-direction:column;gap:14px"><div class="spin"></div><div style="color:var(--t3);font-size:14px;font-weight:700">جاري إعادة التحميل...</div></div>';
  fetchFresh();
}
// ============================
// CSV PARSER
// ============================
function parseCSV(t){
  const l=t.trim().split('\n');if(l.length<2)return[];
  const p=[];
  for(let i=1;i<l.length;i++){
    const c=csvLine(l[i]);if(!c[0]||!c[0].trim())continue;
    p.push({n:(c[0]||'').trim(),pr:parseFloat((c[1]||'0').replace(/,/g,''))||0,k:'p_'+i,cat:(c[2]||'متنوعات').trim(),img:(c[3]||'').trim()});
  }
  return p;
}
function csvLine(l){const r=[];let c='',q=false;for(let i=0;i<l.length;i++){const ch=l[i];if(ch==='"'){q=!q;continue}if(ch===','&&!q){r.push(c);c='';continue}c+=ch}r.push(c);return r}
// === CATEGORIES ===
// ============================
// CATEGORIES
// ============================
const CI={'منظفات':'🧹','معلبات':'🥫','سناكات وشوكولا وتسال':'🍿','مشروبات':'🥤','بن وشاي':'☕'};
let catsBuilt=false;
function buildCats(){
  if(catsBuilt)return;catsBuilt=true;
  const cats=[...new Set(P.map(p=>p.cat))].sort(),s=document.getElementById('cs');
  cats.forEach(c=>{if(!c)return;const b=document.createElement('button');b.className='cat';b.dataset.c=c;b.textContent=(CI[c]||'📦')+' '+c;b.onclick=function(){selC(c,this)};s.appendChild(b)});
}
function selC(c,b){
  aCat=c;sQ='';document.getElementById('si').value='';document.getElementById('sc').classList.remove('on');
  document.querySelectorAll('.cat').forEach(x=>x.classList.remove('on'));b.classList.add('on');
  b.scrollIntoView({behavior:'smooth',block:'nearest',inline:'center'});
  render();window.scrollTo({top:0,behavior:'smooth'});
}
// === SEARCH ===
// ============================
// SEARCH
// ============================
document.getElementById('si').addEventListener('input',function(){
  const v=this.value.trim();document.getElementById('sc').classList.toggle('on',v.length>0);
  clearTimeout(sT);sT=setTimeout(()=>{
    sQ=v;document.querySelectorAll('.cat').forEach(b=>b.classList.remove('on'));
    if(!sQ){document.querySelector('.all').classList.add('on');aCat='all'}
    render();
  },120);
});
function clrS(){sQ='';document.getElementById('si').value='';document.getElementById('sc').classList.remove('on');document.querySelector('.all').classList.add('on');aCat='all';render();document.getElementById('si').focus()}
// === RENDER ===
// ============================
// RENDER
// ============================
function render(){
  const g=document.getElementById('gd'),e=document.getElementById('emp'),n=document.getElementById('nt'),m=document.getElementById('mt');
  let f=P;const iS=sQ.length>0,iF=iS||aCat!=='all';
  if(iS){const q=sQ.toLowerCase();f=P.filter(p=>p.n.toLowerCase().includes(q)||p.cat.toLowerCase().includes(q))}
  else if(aCat!=='all')f=P.filter(p=>p.cat===aCat);
  const tot=f.length;let show,sN=false;
  if(!iF){show=f.slice(0,MX);if(tot>MX)sN=true}else{show=f.slice(0,MXF)}
  if(!iF){show=f.slice(0,MX);if(tot>MX)sN=true}else show=f.slice(0,MXF);
  n.classList.toggle('on',sN);
  if(!show.length){g.innerHTML='';e.style.display='flex';m.textContent='';return}
  e.style.display='none';
  m.textContent=iF&&tot>0?`عرض ${show.length} من أصل ${tot} منتج`:`إجمالي المنتجات: ${tot}`;
  m.textContent=iF&&tot>0?`عرض ${show.length} من أصل ${tot} منتج`:tot>0?`إجمالي المنتجات: ${tot}`:'';
  const fr=document.createDocumentFragment();
  show.forEach((p,i)=>fr.appendChild(mkCard(p,i)));
  g.innerHTML='';g.appendChild(fr);
}
// === BUILD CARD ===
// ============================
// BUILD CARD
// ============================
function mkCard(p,i){
  const q=cart[p.k]?cart[p.k].q:0,ic=q>0;
  const d=document.createElement('div');d.className='p-card'+(ic?' in':'');d.id='c-'+p.k;d.style.animationDelay=(i*.03)+'s';
  let img;
  if(p.img){img=`<img src="${esc(p.img)}" alt="${esc(p.n)}" loading="lazy" style="width:100%;height:100%;object-fit:cover;border-radius:12px" onerror="this.parentElement.innerHTML='${PH.replace(/'/g,"\\'")}'"/>`}else{img=PH}
  const d=document.createElement('div');d.className='p-card'+(ic?' in':'');d.id='c-'+p.k;d.style.animationDelay=(i*.025)+'s';
  const img=p.img?`<img src="${esc(p.img)}" alt="${esc(p.n)}" loading="${i<6?'eager':'lazy'}" style="width:100%;height:100%;object-fit:cover;border-radius:10px" onerror="this.parentElement.innerHTML='${PH.replace(/'/g,"\\'")}'"/>`:PH;
  const pr=p.pr>0?p.pr.toLocaleString('ar-SY')+' <small>ل.س</small>':'<small style="color:var(--t4)">السعر عند الطلب</small>';
  d.innerHTML=`<div class="p-img">${img}</div><div class="p-info"><div class="p-cat">${eh(p.cat)}</div><div class="p-name" title="${esc(p.n)}">${eh(p.n)}</div><div class="p-price">${pr}</div></div><div class="p-act">${ic?`<div class="qty"><button class="q-btn mi" onclick="uQ('${esc(p.k)}',-1)">−</button><span class="q-num">${q}</span><button class="q-btn pl" onclick="uQ('${esc(p.k)}',1)">+</button></div>`:`<button class="add-btn" onclick="aTC('${esc(p.k)}')">+ أضف</button>`}</div>`;
  return d;
}
// === CART ===
// ============================
// CART LOGIC

function aTC(k){const p=P.find(x=>x.k===k);if(!p)return;if(!cart[k])cart[k]={p,q:1};else cart[k].q++;uCard(k);uCP();toast('✅ تمت الإضافة')}
