<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مطعم Friends</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 pb-24">

    <header class="bg-red-600 text-white p-6 text-center shadow-lg">
        <h1 class="text-2xl font-bold">مطعم Friends</h1>
    </header>

    <div class="sticky top-0 z-20 bg-gray-50 p-4 shadow-sm">
        <input type="text" id="searchInput" placeholder="🔍 بحث عن وجبة..." class="w-full p-3 rounded-lg border mb-3">
        <div id="categoryTabs" class="flex gap-2 overflow-x-auto pb-2">
            </div>
    </div>

    <div id="productGrid" class="p-4 grid grid-cols-1 gap-4"></div>

    <div class="fixed bottom-0 w-full p-4 bg-white border-t shadow-lg">
        <button onclick="showCart()" class="w-full bg-green-600 text-white py-3 rounded-lg font-bold">
            🛒 عرض السلة وإتمام الطلب
        </button>
    </div>

    <script>
        // هنا تضع رابط الـ CSV الخاص بك
        const CSV_URL = 'YOUR_GOOGLE_SHEET_CSV_URL'; 
        let products = [];
        let cart = {};

        async function fetchData() {
            const res = await fetch(CSV_URL);
            const data = await res.text();
            // معالجة البيانات من الشيت
            products = data.split('\n').slice(1).map(row => {
                const [name, price, cat, desc, img] = row.split(',');
                return { name, price, cat, desc, img };
            }).filter(p => p.name);
            renderTabs();
            renderProducts();
        }

        function renderTabs() {
            const cats = ['الكل', ...new Set(products.map(p => p.cat))];
            document.getElementById('categoryTabs').innerHTML = cats.map(c => 
                `<button onclick="filterBy('${c}')" class="px-4 py-2 bg-white border rounded-full whitespace-nowrap">${c}</button>`
            ).join('');
        }

        function renderProducts(filter = 'الكل') {
            const search = document.getElementById('searchInput').value.toLowerCase();
            const filtered = products.filter(p => 
                (filter === 'الكل' || p.cat === filter) && 
                p.name.toLowerCase().includes(search)
            );
            document.getElementById('productGrid').innerHTML = filtered.map(p => `
                <div class="bg-white p-4 rounded-xl shadow flex items-center gap-4">
                    <img src="${p.img}" class="w-20 h-20 rounded-lg object-cover">
                    <div class="flex-grow">
                        <h3 class="font-bold">${p.name}</h3>
                        <p class="text-red-600">${p.price} ل.س</p>
                    </div>
                    <button onclick="addToCart('${p.name}')" class="bg-red-100 text-red-600 px-4 py-2 rounded-lg">+</button>
                </div>
            `).join('');
        }

        // إضافة دوال البحث والفلترة والسلة هنا...
        // (ملاحظة: هذا الكود هيكلي، يمكنك إضافة منطق السلة ببساطة)
    </script>
</body>
</html>
