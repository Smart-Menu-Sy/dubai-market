<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>دبي ماركت | Dubai Market</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  :root {
    --red: #dc2626;
    --red-dark: #b91c1c;
    --blue: #2563eb;
    --blue-dark: #1d4ed8;
    --navy: #0f172a;
    --surface: #f8fafc;
    --card: #ffffff;
    --border: #e2e8f0;
    --text: #1e293b;
    --muted: #64748b;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body {
    font-family: 'Cairo', sans-serif;
    background: var(--surface);
    color: var(--text);
    padding-bottom: 180px;
  }

  /* Header */
  .header {
    background: linear-gradient(135deg, var(--red-dark) 0%, var(--red) 50%, var(--blue) 100%);
    position: sticky; top: 0; z-index: 100;
    box-shadow: 0 4px 20px rgba(220,38,38,0.3);
  }
  .header-inner {
    max-width: 900px; margin: 0 auto;
    padding: 12px 16px;
    display: flex; align-items: center; gap: 12px;
  }
  .logo-box {
    width: 44px; height: 44px;
    background: #fff; border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px; flex-shrink: 0;
    box-shadow: 0 2px 8px rgba(0,0,0,0.2);
  }
  .brand-name { color: #fff; font-size: 18px; font-weight: 800; line-height: 1.2; }
  .brand-sub { color: rgba(255,255,255,0.85); font-size: 11px; font-weight: 600; }
  .header-phone {
    margin-right: auto;
    background: rgba(255,255,255,0.15);
    border: 1px solid rgba(255,255,255,0.25);
    border-radius: 10px;
    padding: 6px 12px;
    color: #fff;
    font-size: 13px; font-weight: 700;
    text-decoration: none;
    backdrop-filter: blur(4px);
  }

  /* Search */
  .search-wrap {
    max-width: 900px; margin: 0 auto; padding: 12px 16px;
    position: relative;
  }
  #search-input {
    width: 100%;
    background: #fff;
    border: 2px solid var(--border);
    border-radius: 14px;
    padding: 12px 44px 12px 16px;
    font-family: 'Cairo', sans-serif;
    font-size: 15px; font-weight: 600;
    outline: none;
    transition: all 0.2s;
    box-shadow: 0 2px 8px rgba(0,0,0,0.04);
  }
  #search-input:focus { border-color: var(--blue); box-shadow: 0 0 0 3px rgba(37,99,235,0.1); }
  .search-icon {
    position: absolute; right: 28px; top: 50%; transform: translateY(-50%);
    font-size: 18px; color: var(--muted);
  }
  #clear-search {
    position: absolute; left: 24px; top: 50%; transform: translateY(-50%);
    background: var(--border); border: none; border-radius: 50%;
    width: 26px; height: 26px; cursor: pointer;
    display: none; align-items: center; justify-content: center;
    font-size: 14px; color: var(--muted);
  }
  #clear-search.visible { display: flex; }

  /* Categories */
  .cats-bar {
    background: #fff;
    border-bottom: 1px solid var(--border);
    position: sticky; top: 68px; z-index: 90;
  }
  .cats-scroll {
    max-width: 900px; margin: 0 auto;
    display: flex; gap: 8px; padding: 10px 16px;
    overflow-x: auto; scrollbar-width: none;
  }
  .cats-scroll::-webkit-scrollbar { display: none; }
  .cat-btn {
    flex-shrink: 0;
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: 50px;
    padding: 7px 16px;
    font-family: 'Cairo', sans-serif;
    font-size: 13px; font-weight: 700;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
  }
  .cat-btn.active {
    background: var(--red);
    border-color: var(--red);
    color: #fff;
    box-shadow: 0 2px 10px rgba(220,38,38,0.3);
  }
  .cat-btn.all-btn.active {
    background: var(--blue);
    border-color: var(--blue);
    box-shadow: 0 2px 10px rgba(37,99,235,0.3);
  }

  /* Products */
  .products-wrap { max-width: 900px; margin: 0 auto; padding: 12px 16px; }
  .meta-text { font-size: 12px; color: var(--muted); font-weight: 600; margin-bottom: 10px; }
  
  .product-card {
    background: var(--card);
    border-radius: 16px;
    border: 1px solid var(--border);
    display: flex; align-items: center;
    margin-bottom: 10px;
    overflow: hidden;
    box-shadow: 0 2px 6px rgba(0,0,0,0.04);
    transition: transform 0.15s, box-shadow 0.2s;
  }
  .product-card:active { transform: scale(0.995); }
  .product-card.in-cart { border-color: var(--blue); box-shadow: 0 2px 12px rgba(37,99,235,0.12); }
  
  .p-img {
    width: 80px; height: 80px; flex-shrink: 0;
    background: linear-gradient(135deg, #f1f5f9, #e2e8f0);
    display: flex; align-items: center; justify-content: center;
    border-left: 1px solid var(--border);
    overflow: hidden;
  }
  .p-img img { width: 100%; height: 100%; object-fit: cover; }
  .p-img .placeholder { font-size: 28px; opacity: 0.3; }
  
  .p-info { flex: 1; padding: 10px 12px; min-width: 0; }
  .p-cat { 
    display: inline-block; 
    background: #eff6ff; color: var(--blue);
    font-size: 10px; font-weight: 700;
    border-radius: 50px; padding: 2px 8px; margin-bottom: 4px;
  }
  .p-name { font-size: 14px; font-weight: 700; line-height: 1.3; margin-bottom: 4px; }
  .p-price { font-size: 15px; font-weight: 800; color: var(--red); }
  .p-price span { font-size: 11px; color: var(--muted); font-weight: 600; }
  
  .p-actions { padding: 0 12px; display: flex; flex-direction: column; align-items: center; gap: 6px; }
  .qty-box {
    display: flex; align-items: center; gap: 6px;
    background: var(--surface); border-radius: 50px;
    padding: 3px; border: 1px solid var(--border);
  }
  .qty-btn {
    width: 30px; height: 30px; border-radius: 50%; border: none;
    font-size: 16px; font-weight: 700; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.15s;
  }
  .qty-btn.minus { background: #fee2e2; color: var(--red); }
  .qty-btn.plus { background: #dbeafe; color: var(--blue); }
  .qty-btn:active { transform: scale(0.9); }
  .qty-num { font-size: 14px; font-weight: 800; min-width: 20px; text-align: center; }
  
  .add-btn {
    background: var(--blue); color: #fff; border: none;
    border-radius: 50px; padding: 8px 14px;
    font-family: 'Cairo', sans-serif; font-size: 12px; font-weight: 700;
    cursor: pointer; box-shadow: 0 2px 8px rgba(37,99,235,0.25);
    transition: all 0.15s; white-space: nowrap;
  }
  .add-btn:active { transform: scale(0.95); background: var(--blue-dark); }

  /* Loading & Empty */
  .loading { text-align: center; padding: 60px 20px; color: var(--muted); }
  .spinner {
    width: 40px; height: 40px;
    border: 3px solid var(--border);
    border-top-color: var(--red);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 12px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  
  .empty { display: none; text-align: center; padding: 60px 20px; color: var(--muted); }
  .empty .icon { font-size: 48px; margin-bottom: 8px; }
  .empty p { font-size: 15px; font-weight: 700; }

  /* Cart Panel */
  .cart-panel {
    position: fixed; bottom: 0; left: 0; right: 0;
    background: linear-gradient(to top, var(--navy) 0%, #1e293b 100%);
    border-top: 1px solid rgba(255,255,255,0.1);
    z-index: 200;
    box-shadow: 0 -8px 24px rgba(0,0,0,0.3);
  }
  .cart-bar {
    display: flex; align-items: center; justify-content: space-between;
    padding: 12px 16px; cursor: pointer; user-select: none;
  }
  .cart-bar-left { display: flex; align-items: center; gap: 10px; }
  .cart-icon {
    width: 36px; height: 36px; background: var(--red);
    border-radius: 10px; display: flex; align-items: center; justify-content: center;
    font-size: 18px;
  }
  .cart-title { color: #fff; font-size: 14px; font-weight: 700; }
  .cart-total { color: #fbbf24; font-size: 16px; font-weight: 800; }
  .cart-arrow { color: rgba(255,255,255,0.5); font-size: 20px; transition: transform 0.3s; }
  .cart-panel.open .cart-arrow { transform: rotate(180deg); }
  
  .cart-body {
    display: none; max-height: 200px; overflow-y: auto;
    scrollbar-width: thin; scrollbar-color: rgba(255,255,255,0.2) transparent;
  }
  .cart-panel.open .cart-body { display: block; }
  
  .cart-item {
    display: flex; align-items: center; justify-content: space-between;
    padding: 8px 16px; border-bottom: 1px solid rgba(255,255,255,0.05);
  }
  .cart-item-name { color: #cbd5e1; font-size: 12px; font-weight: 600; flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .cart-item-qty { color: #94a3b8; font-size: 11px; font-weight: 600; margin: 0 8px; }
  .cart-item-price { color: #fbbf24; font-size: 13px; font-weight: 800; margin: 0 8px; }
  .cart-item-del { background: none; border: none; color: var(--red); font-size: 16px; cursor: pointer; }
  
  .cart-form {
    display: none; padding: 12px 16px; gap: 8px; flex-direction: column;
    border-top: 1px solid rgba(255,255,255,0.07);
  }
  .cart-panel.open .cart-form { display: flex; }
  .form-inp {
    background: rgba(255,255,255,0.07);
    border: 1.5px solid rgba(255,255,255,0.12);
    border-radius: 12px; padding: 10px 12px;
    color: #fff; font-family: 'Cairo', sans-serif;
    font-size: 13px; font-weight: 600; outline: none;
  }
  .form-inp::placeholder { color: rgba(255,255,255,0.35); }
  .form-inp:focus { border-color: var(--blue); background: rgba(255,255,255,0.1); }
  .form-row { display: flex; gap: 8px; }
  .form-row .form-inp { flex: 1; }
  
  .send-btn {
    background: linear-gradient(135deg, #25d366, #128c7e);
    border: none; border-radius: 14px; padding: 12px;
    color: #fff; font-family: 'Cairo', sans-serif;
    font-size: 15px; font-weight: 800; cursor: pointer;
    display: flex; align-items: center; justify-content: center; gap: 8px;
    box-shadow: 0 4px 16px rgba(37,211,102,0.3);
    transition: all 0.2s;
  }
  .send-btn:active { transform: scale(0.98); opacity: 0.9; }

  /* Badge */
  .badge {
    position: absolute; top: -4px; right: -4px;
    background: var(--red); color: #fff;
    border-radius: 50%; width: 20px; height: 20px;
    font-size: 11px; font-weight: 900;
    display: none; align-items: center; justify-content: center;
    border: 2px solid var(--navy);
  }
  .badge.show { display: flex; }

  /* Grid on desktop */
  @media (min-width: 640px) {
    .products-wrap { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .product-card { margin-bottom: 0; }
  }
  @media (min-width: 900px) {
    .products-wrap { grid-template-columns: 1fr 1fr 1fr; }
  }
</style>
</head>
<body>

<!-- Header -->
<header class="header">
  <div class="header-inner">
    <div class="logo-box">🛒</div>
    <div style="flex:1">
      <div class="brand-name">دبي ماركت</div>
      <div class="brand-sub">DUBAI MARKET — دمشق</div>
    </div>
    <a href="tel:0965436980" class="header-phone">📞 0965436980</a>
  </div>
</header>

<!-- Search -->
<div style="background:#fff; border-bottom:1px solid var(--border);">
  <div class="search-wrap">
    <span class="search-icon">🔍</span>
    <input id="search-input" type="text" placeholder="ابحث عن منتج..." autocomplete="off"/>
    <button id="clear-search" onclick="clearSearch()">✕</button>
  </div>
</div>

<!-- Categories -->
<div class="cats-bar">
  <div class="cats-scroll" id="cats-scroll">
    <button class="cat-btn all-btn active" data-cat="all" onclick="pickCat('all',this)">🏪 الكل</button>
  </div>
</div>

<!-- Products -->
<div class="products-wrap" id="products-wrap">
  <div class="loading" id="loading">
    <div class="spinner"></div>
    <div>جاري تحميل المنتجات...</div>
  </div>
</div>

<!-- Empty -->
<div class="empty" id="empty">
  <div class="icon">🔍</div>
  <p>لا توجد نتائج</p>
  <small>جرب كلمة بحث مختلفة</small>
</div>

<!-- Cart -->
<div class="cart-panel" id="cart-panel">
  <div class="cart-bar" onclick="toggleCart()">
    <div class="cart-bar-left">
      <div style="position:relative">
        <div class="cart-icon">🛒</div>
        <span class="badge" id="cart-badge">0</span>
      </div>
      <div>
        <div class="cart-title">سلة المشتريات <span id="cart-count" style="color:#94a3b8; font-size:12px;"></span></div>
        <div class="cart-total" id="cart-total">0 ل.س</div>
      </div>
    </div>
    <span class="cart-arrow" id="cart-arrow">⌃</span>
  </div>
  
  <div class="cart-body" id="cart-body"></div>
  
  <div class="cart-form">
    <div class="form-row">
      <input class="form-inp" id="c-name" placeholder="👤 اسم الزبون" autocomplete="name"/>
      <input class="form-inp" id="c-phone" placeholder="📱 رقم الموبايل" autocomplete="tel"/>
    </div>
    <input class="form-inp" id="c-addr" placeholder="📍 العنوان بالتفصيل" autocomplete="street-address"/>
    <button class="send-btn" onclick="sendOrder()">
      <span>💬</span>
      <span>إرسال الطلب عبر واتساب</span>
      <span style="font-size:13px; opacity:0.9" id="send-total"></span>
    </button>
  </div>
</div>

<script>
const SHEET = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTtNzL5RpYNOFwQsy63YyqYLK4ExXEKO8nfmfKlLdRMoIFy1sPIZT8dPFcKkQK6f2P9jYPuFDQOxW3C/pub?gid=0&single=true&output=csv';
const WHATSAPP = '963965436980';
let products = [], cart = {}, activeCat = 'all', searchQ = '', cartOpen = false;

const icons = {'منظفات':'🧹','معلبات':'🥫','سناكات وشوكولا وتسال':'🍿','مشروبات':'🥤','بن وشاي':'☕'};

async function load() {
  try {
    const res = await fetch(SHEET + '&t=' + Date.now());
    const text = await res.text();
    products = parseCSV(text);
    buildCats();
    render();
    document.getElementById('loading').style.display = 'none';
  } catch(e) {
    document.getElementById('loading').innerHTML = `<div style="color:var(--red); font-weight:700;">⚠️ فشل التحميل</div><div style="font-size:12px; color:var(--muted);">${e.message}</div><button onclick="location.reload()" style="margin-top:12px; background:var(--blue); color:#fff; border:none; border-radius:10px; padding:8px 20px; font-family:Cairo; font-weight:700; cursor:pointer;">إعادة المحاولة</button>`;
  }
}

function parseCSV(t) {
  const lines = t.trim().split('\n');
  const out = [];
  for(let i=1;i<lines.length;i++) {
    const c = splitLine(lines[i]);
    if(!c[0]) continue;
    out.push({
      name: c[0].trim(),
      price: parseFloat((c[1]||'0').replace(/,/g,''))||0,
      barcode: 'p_'+i,
      category: (c[2]||'متنوعات').trim(),
      image: (c[3]||'').trim()
    });
  }
  return out;
}

function splitLine(line) {
  const r=[]; let cur='', q=false;
  for(let i=0;i<line.length;i++) {
    const ch=line[i];
    if(ch==='"'){ q=!q; continue; }
    if(ch===',' && !q){ r.push(cur); cur=''; continue; }
    cur+=ch;
  }
  r.push(cur); return r;
}

function buildCats() {
  const cats = [...new Set(products.map(p=>p.category))].sort();
  const box = document.getElementById('cats-scroll');
  cats.forEach(c => {
    const b = document.createElement('button');
    b.className = 'cat-btn'; b.dataset.cat = c;
    b.textContent = (icons[c]||'📦') + ' ' + c;
    b.onclick = () => pickCat(c, b);
    box.appendChild(b);
  });
}

function pickCat(cat, btn) {
  activeCat = cat; searchQ = '';
  document.getElementById('search-input').value = '';
  document.getElementById('clear-search').classList.remove('visible');
  document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  btn.scrollIntoView({behavior:'smooth', inline:'center'});
  render();
}

document.getElementById('search-input').addEventListener('input', function() {
  searchQ = this.value.trim();
  document.getElementById('clear-search').classList.toggle('visible', searchQ.length>0);
  if(!searchQ) { activeCat='all'; document.querySelector('.all-btn').classList.add('active'); }
  else document.querySelectorAll('.cat-btn').forEach(b=>b.classList.remove('active'));
  render();
});

function clearSearch() {
  searchQ = ''; document.getElementById('search-input').value='';
  document.getElementById('clear-search').classList.remove('visible');
  activeCat='all'; document.querySelector('.all-btn').classList.add('active');
  render();
}

function render() {
  const wrap = document.getElementById('products-wrap');
  const empty = document.getElementById('empty');
  let list = products;
  const isSearch = searchQ.length > 0;
  
  if(isSearch) {
    const q = searchQ.toLowerCase();
    list = products.filter(p => p.name.toLowerCase().includes(q) || p.category.toLowerCase().includes(q));
  } else if(activeCat !== 'all') {
    list = products.filter(p => p.category === activeCat);
  }
  
  if(list.length === 0) {
    wrap.innerHTML = ''; empty.style.display = 'block'; return;
  }
  empty.style.display = 'none';
  
  const meta = document.createElement('div');
  meta.className = 'meta-text';
  meta.textContent = isSearch ? `نتائج البحث: ${list.length} منتج` : `إجمالي المنتجات: ${list.length}`;
  meta.id = 'meta-box';
  
  const oldMeta = document.getElementById('meta-box');
  if(oldMeta) oldMeta.remove();
  wrap.parentNode.insertBefore(meta, wrap);
  
  wrap.innerHTML = '';
  list.forEach((p, i) => wrap.appendChild(card(p, i)));
}

function card(p, idx) {
  const key = p.barcode;
  const q = cart[key] ? cart[key].qty : 0;
  const el = document.createElement('div');
  el.className = 'product-card' + (q>0?' in-cart':'');
  el.id = 'c-'+key;
  el.style.animation = `fadeIn 0.3s ease ${idx*0.02}s both`;
  
  const price = p.price > 0 ? p.price.toLocaleString('ar-SY') + ' ل.س' : 'السعر عند الطلب';
  const img = p.image ? `<img src="${esc(p.image)}" alt="" loading="lazy" onerror="this.style.display='none'; this.parentNode.innerHTML='<span class=\\'placeholder\\'>📦</span>'">` : '<span class="placeholder">📦</span>';
  
  el.innerHTML = `
    <div class="p-img">${img}</div>
    <div class="p-info">
      <div class="p-cat">${esc(p.category)}</div>
      <div class="p-name">${esc(p.name)}</div>
      <div class="p-price">${price}</div>
    </div>
    <div class="p-actions">
      ${q>0 ? `
        <div class="qty-box">
          <button class="qty-btn minus" onclick="changeQty('${esc(key)}',-1)">−</button>
          <span class="qty-num">${q}</span>
          <button class="qty-btn plus" onclick="changeQty('${esc(key)}',1)">+</button>
        </div>
      ` : `<button class="add-btn" onclick="addCart('${esc(key)}')">+ أضف</button>`}
    </div>
  `;
  return el;
}

function addCart(key) {
  const p = products.find(x => x.barcode === key);
  if(!p) return;
  cart[key] = cart[key] || {product:p, qty:0};
  cart[key].qty++;
  updateUI(key);
  updateCart();
}

function changeQty(key, d) {
  if(!cart[key]) return;
  cart[key].qty += d;
  if(cart[key].qty <= 0) delete cart[key];
  updateUI(key);
  updateCart();
}

function removeCart(key) {
  delete cart[key];
  updateUI(key);
  updateCart();
}

function updateUI(key) {
  const el = document.getElementById('c-'+key);
  if(!el) return;
  const q = cart[key] ? cart[key].qty : 0;
  const act = el.querySelector('.p-actions');
  if(q > 0) {
    el.classList.add('in-cart');
    act.innerHTML = `
      <div class="qty-box">
        <button class="qty-btn minus" onclick="changeQty('${esc(key)}',-1)">−</button>
        <span class="qty-num">${q}</span>
        <button class="qty-btn plus" onclick="changeQty('${esc(key)}',1)">+</button>
      </div>`;
  } else {
    el.classList.remove('in-cart');
    act.innerHTML = `<button class="add-btn" onclick="addCart('${esc(key)}')">+ أضف</button>`;
  }
}

function cartTotal() {
  return Object.values(cart).reduce((s, i) => s + i.product.price * i.qty, 0);
}
function cartCount() {
  return Object.values(cart).reduce((s, i) => s + i.qty, 0);
}

function updateCart() {
  const total = cartTotal();
  const count = cartCount();
  const keys = Object.keys(cart);
  
  document.getElementById('cart-total').textContent = total.toLocaleString('ar-SY') + ' ل.س';
  document.getElementById('send-total').textContent = '— ' + total.toLocaleString('ar-SY') + ' ل.س';
  document.getElementById('cart-count').textContent = count > 0 ? '(' + count + ' صنف)' : '';
  
  const badge = document.getElementById('cart-badge');
  if(count > 0) { badge.textContent = count; badge.classList.add('show'); }
  else badge.classList.remove('show');
  
  const body = document.getElementById('cart-body');
  if(keys.length === 0) {
    body.innerHTML = '<div style="text-align:center; padding:20px; color:#64748b; font-size:13px;">سلتك فارغة 🛒</div>';
    return;
  }
  
  body.innerHTML = '';
  keys.forEach(k => {
    const {product, qty} = cart[k];
    const row = document.createElement('div');
    row.className = 'cart-item';
    row.innerHTML = `
      <span class="cart-item-name" title="${esc(product.name)}">${esc(product.name)}</span>
      <span class="cart-item-qty">${qty}×</span>
      <span class="cart-item-price">${(product.price*qty).toLocaleString('ar-SY')}</span>
      <button class="cart-item-del" onclick="removeCart('${esc(k)}')">🗑</button>
    `;
    body.appendChild(row);
  });
}

function toggleCart() {
  cartOpen = !cartOpen;
  document.getElementById('cart-panel').classList.toggle('open', cartOpen);
  if(cartOpen) updateCart();
}

function sendOrder() {
  const name = document.getElementById('c-name').value.trim();
  const phone = document.getElementById('c-phone').value.trim();
  const addr = document.getElementById('c-addr').value.trim();
  
  if(!name){ alert('يرجى إدخال اسم الزبون'); document.getElementById('c-name').focus(); return; }
  if(!phone){ alert('يرجى إدخال رقم الموبايل'); document.getElementById('c-phone').focus(); return; }
  if(!addr){ alert('يرجى إدخال العنوان'); document.getElementById('c-addr').focus(); return; }
  
  const keys = Object.keys(cart);
  if(keys.length === 0){ alert('السلة فارغة!'); return; }
  
  const total = cartTotal();
  const now = new Date();
  let msg = `🛒 *طلب جديد — دبي ماركت*\n`;
  msg += `━━━━━━━━━━━━\n`;
  msg += `👤 *الزبون:* ${name}\n📱 *الموبايل:* ${phone}\n📍 *العنوان:* ${addr}\n`;
  msg += `🕐 *الوقت:* ${now.toLocaleString('ar-SY')}\n`;
  msg += `━━━━━━━━━━━━\n📦 *المنتجات:*\n\n`;
  
  keys.forEach((k, i) => {
    const {product, qty} = cart[k];
    msg += `${i+1}. ${product.name}\n   ${qty} × ${product.price.toLocaleString('ar-SY')} = *${(product.price*qty).toLocaleString('ar-SY')} ل.س*\n\n`;
  });
  
  msg += `━━━━━━━━━━━━\n💰 *المجموع: ${total.toLocaleString('ar-SY')} ل.س*\n━━━━━━━━━━━━\n✅ شكراً لتسوقك من دبي ماركت!`;
  
  window.open(`https://wa.me/${WHATSAPP}?text=${encodeURIComponent(msg)}`, '_blank');
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

// Init
updateCart();
load();
</script>
